[phases.setup]
nixPkgs = ["nodejs_22", "python311", "ffmpeg", "gcc", "gnumake", "pkg-config"]

[phases.install]
cmds = ["npm install --ignore-scripts", "node node_modules/sharp/install/check || npx --yes sharp-cli install"]

[phases.build]
cmds = []

[start]
cmd = "node index.js"

[variables]
YOUTUBE_DL_SKIP_PYTHON_CHECK = "1"
NPM_CONFIG_OPTIONAL = "false"
